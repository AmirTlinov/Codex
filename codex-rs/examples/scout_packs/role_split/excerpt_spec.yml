version: 2
title: "role_split: Scout context pack (quote-backed example)"
summary: "Minimal-noise example: Scout handoff with anchor-first CODE_REF entries and auto-expanded verbatim excerpts."
repo_root: ".."
default_crate: "codex-rs"

quality_gates:
  - "G1 Coverage"
  - "G2 Determinism"
  - "G3 Evidence-first"
  - "G7 Quote-backed claims"

sections:
  - heading: "Just recipes: scout-pack and scout-pack-check"
    description: "Single-command validation and rendering flow used by Scout."
    excerpts:
      - id: "justfile-scout-pack"
        code_ref: "CODE_REF::codex-rs::justfile#L75-L81"
        label: "justfile: scout-pack + scout-pack-check"
        why: "Runtime handoff requires stdout-first rendering and preflight validation."
        must_include:
          - "scout-pack *args:"
          - "scout-pack-check spec:"

  - heading: "Runtime Scout prompt contract"
    description: "Prompt-level requirements for inline artifacts and quote-backed claims."
    excerpts:
      - id: "scout-prompt-artifacts-and-render"
        code_ref: "CODE_REF::codex-rs::codex-rs/core/templates/agents/scout.md#L12-L45"
        language: "markdown"
        label: "Required artifacts + stdout-first render"
        why: "Defines required artifacts and mandatory stdout render path."
        must_include:
          - "inline all three artifacts"
          - "version: 2"
          - "just scout-pack <excerpt_spec.yml> -o -"

      - id: "scout-prompt-quote-backed-code-ref"
        code_ref: "CODE_REF::codex-rs::codex-rs/core/templates/agents/scout.md#L62-L69"
        language: "markdown"
        label: "CODE_REF + quote requirement"
        why: "Ensures Main receives claim evidence, not only line ranges."
        must_include:
          - "CODE_REF without a quote is invalid"
          - "placeholder anchors"

  - heading: "Skill-level scout contract"
    description: "Patch-ready quality gates and anti-noise guarantees."
    excerpts:
      - id: "scout-skill-sections-and-code-ref"
        code_ref: "CODE_REF::codex-rs::codex-rs/.agents/skills/scout_context_pack/SKILL.md#L25-L60"
        language: "markdown"
        label: "Required sections + CODE_REF contract + gates"
        why: "Keeps role prompt and skill docs aligned on quote-backed evidence."
        must_include:
          - "Evidence quotes"
          - "CODE_REF"
          - "G7 Quote-backed claims"

  - heading: "Scout report template expectations"
    description: "Canonical report shape consumed by Main without extra digging."
    excerpts:
      - id: "scout-report-template-quote-section"
        code_ref: "CODE_REF::codex-rs::codex-rs/.agents/skills/scout_context_pack/templates/ScoutReport.md#L22-L46"
        language: "markdown"
        label: "Invariants + Evidence quotes section"
        why: "Shows required Claim/CODE_REF/Quote/Excerpt-id tuple."
        must_include:
          - "Evidence quotes"
          - "Quote:"
          - "Excerpt id:"

      - id: "scout-report-template-gates"
        code_ref: "CODE_REF::codex-rs::codex-rs/.agents/skills/scout_context_pack/templates/ScoutReport.md#L77-L84"
        language: "markdown"
        label: "Patch readiness gates"
        why: "Adds explicit gate for quote-backed claims."
        must_include:
          - "G7 Quote-backed claims"

  - heading: "Generator fail-closed checks"
    description: "Renderer rejects duplicate/overlapping ranges and missing must_include tokens."
    excerpts:
      - id: "scout-pack-validation-overlap-and-must-include"
        code_ref: "CODE_REF::codex-rs::codex-rs/scripts/scout_pack.py#L334-L454"
        language: "python"
        label: "code_ref parsing + overlap checks + must_include enforcement"
        why: "Prevents noisy or stale context by failing closed."
        must_include:
          - "code_ref cannot be combined"
          - "overlapping range"
          - "must_include"
          - "token not found in excerpt body"
